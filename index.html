<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        :root { --gold: #ffcc33; --bg: #0d0d12; --neon: #f1c40f; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .header { display: flex; justify-content: space-between; padding: 15px; background: #16161e; border-bottom: 2px solid var(--neon); }
        .bal-box { background: #26262b; padding: 5px 12px; border-radius: 15px; border: 1px solid var(--gold); display: flex; align-items: center; gap: 8px; }
        .scr { display: none; padding: 20px; }
        .active { display: block; }
        
        /* РОЛЛС КОЛЕСО */
        .wheel-container { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 5px solid white; box-shadow: 0 0 20px var(--neon); transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .timer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; border: 2px solid var(--gold); }
        .arrow { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); color: red; font-size: 35px; z-index: 100; }

        .btn-plus { background: var(--gold); color: black; border: none; border-radius: 50%; width: 30px; height: 30px; font-weight: 900; font-size: 20px; }
        .btn-huge { background: linear-gradient(135deg, var(--gold), #d4ac0d); color: black; border: none; width: 100%; padding: 25px; border-radius: 20px; font-size: 24px; font-weight: 900; margin-top: 20px; }
        input { background: #1c1c24; border: 1px solid #444; color: white; width: 100%; padding: 15px; border-radius: 15px; font-size: 22px; text-align: center; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="header">
        <div style="color:var(--gold); font-weight:900; font-size:22px;">👑 HARD GIFT</div>
        <div class="bal-box">
            <span id="bal-txt">0</span> ⭐
            <button class="btn-plus" onclick="send('deposit')">+</button>
        </div>
    </div>

    <div id="m-menu" class="scr active">
        <button class="btn-huge" onclick="show('m-rolls')">🎡 ФОРТУНА (ROLLS)</button>
        <button class="btn-huge" onclick="show('m-rocket')" style="background:#222; color:#fff; border:1px solid #444;">🚀 РАКЕТА</button>
    </div>

    <div id="m-rolls" class="scr">
        <h1 style="color:var(--gold)">Роллс</h1>
        <div class="wheel-container">
            <div class="arrow">▼</div>
            <canvas id="wheel" width="500" height="500"></canvas>
            <div class="timer" id="timer">00:30</div>
        </div>
        <input type="number" id="bet-in" value="10">
        <button class="btn-huge" onclick="playRolls()">ПОСТАВИТЬ</button>
        <button onclick="show('m-menu')" style="margin-top:20px; background:none; border:none; color:#888;">← НАЗАД</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function show(id) {
            document.querySelectorAll('.scr').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'm-rolls') drawWheel();
        }

        function send(data) {
            tg.sendData(data); // Отправляем сигнал боту
        }

        function drawWheel() {
            const ctx = document.getElementById('wheel').getContext('2d');
            const colors = ['#4285F4', '#FBBC05', '#34A853', '#EA4335'];
            let start = 0;
            [0.25, 0.25, 0.25, 0.25].forEach((p, i) => {
                ctx.fillStyle = colors[i];
                ctx.beginPath(); ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, start, start + (Math.PI * 2 * p));
                ctx.fill();
                start += (Math.PI * 2 * p);
            });
        }

        function playRolls() {
            let b = document.getElementById('bet-in').value;
            const wheel = document.getElementById('wheel');
            let deg = Math.floor(Math.random() * 500) + 2000;
            wheel.style.transform = `rotate(${deg}deg)`;
            
            send("play_rolls_" + b);
            
            let s = 30;
            let t = setInterval(() => {
                s--;
                document.getElementById('timer').innerText = "00:" + (s < 10 ? "0" : "") + s;
                if(s <= 0) clearInterval(t);
            }, 1000);
        }
    </script>
</body>
</html>
