<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        :root { --gold: #ffcc33; --neon: #f1c40f; --bg: #0d0d12; --card: #16161e; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; text-align: center; }
        .header { display: flex; justify-content: space-between; padding: 15px 20px; background: rgba(22, 22, 30, 0.9); border-bottom: 2px solid var(--neon); box-shadow: 0 0 15px var(--neon); position: sticky; top: 0; z-index: 100; }
        .logo-text { font-size: 20px; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px var(--neon); }
        .bal-box { background: #26262b; padding: 8px 15px; border-radius: 20px; border: 1px solid var(--gold); display: flex; align-items: center; gap: 8px; }
        
        /* КНОПКИ МЕНЮ */
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 20px; }
        .menu-btn { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #333; display: flex; align-items: center; gap: 20px; transition: 0.2s; text-align: left; }
        .menu-btn:active { transform: scale(0.96); border-color: var(--neon); }
        .menu-btn .icon { font-size: 45px; filter: drop-shadow(0 0 5px var(--neon)); }

        .screen { display: none; padding: 20px; }
        .active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* РОЛЛС КОЛЕСО */
        .rolls-wrap { position: relative; width: 250px; height: 250px; margin: 20px auto; }
        #rolls-canvas { width: 100%; height: 100%; border-radius: 50%; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); border: 4px solid white; box-shadow: 0 0 20px var(--neon); }
        .timer-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; border: 2px solid var(--gold); z-index: 10; }
        .arrow { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); color: #ff3b30; font-size: 30px; z-index: 20; }

        /* РАКЕТА */
        .rocket-area { height: 180px; background: rgba(0,0,0,0.5); border-radius: 20px; display: flex; align-items: center; justify-content: center; border: 2px dashed #444; margin: 20px 0; }
        #rock-mult { font-size: 60px; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px var(--neon); }

        .main-btn { background: linear-gradient(135deg, var(--gold), #d4ac0d); color: black; border: none; width: 100%; padding: 20px; border-radius: 18px; font-size: 22px; font-weight: 900; cursor: pointer; }
        input { background: #1c1c24; border: 1px solid #444; color: white; width: 100%; padding: 15px; border-radius: 12px; font-size: 20px; text-align: center; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-text">👑 HARD GIFT</div>
        <div class="bal-box">
            <span id="bal">0</span> ⭐
            <button onclick="tg.sendData('deposit')" style="background:var(--gold); border:none; border-radius:50%; width:28px; height:28px; font-weight:bold; font-size:20px;">+</button>
        </div>
    </div>

    <!-- МЕНЮ -->
    <div id="scr-menu" class="screen active">
        <div class="menu-grid">
            <div class="menu-btn" onclick="show('scr-rolls')"><span class="icon">🎡</span><div><b style="font-size:22px;">РОЛЛС</b><br><small style="color:#888;">Игра на выбывание</small></div></div>
            <div class="menu-btn" onclick="show('scr-rocket')"><span class="icon">🚀</span><div><b style="font-size:22px;">РАКЕТА</b><br><small style="color:#888;">Успей забрать ⭐</small></div></div>
        </div>
    </div>

    <!-- ЭКРАН РОЛЛС -->
    <div id="scr-rolls" class="screen">
        <h2 style="color:var(--gold)">🎡 ФОРТУНА РОЛЛС</h2>
        <div class="rolls-wrap">
            <div class="arrow">▼</div>
            <canvas id="rolls-canvas" width="500" height="500"></canvas>
            <div class="timer-center" id="r-timer">30s</div>
        </div>
        <input type="number" id="roll-bet" value="10">
        <button class="main-btn" onclick="playRolls()">ПОСТАВИТЬ</button>
        <button onclick="show('scr-menu')" style="margin-top:20px; background:none; border:none; color:#888;">← Назад</button>
    </div>

    <!-- ЭКРАН РАКЕТА -->
    <div id="scr-rocket" class="screen">
        <h2 style="color:var(--gold)">🚀 CRASH GAME</h2>
        <div class="rocket-area"><div id="rock-mult">1.00x</div></div>
        <input type="number" id="rock-bet" value="10">
        <button class="main-btn" id="btn-rock" onclick="startRocket()">ВЗЛЕТЕТЬ</button>
        <button onclick="show('scr-menu')" style="margin-top:20px; background:none; border:none; color:#888;">← Назад</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'scr-rolls') drawWheel();
        }
        function drawWheel() {
            const ctx = document.getElementById('rolls-canvas').getContext('2d');
            const colors = ['#4285F4', '#FBBC05', '#34A853', '#EA4335'];
            let start = 0;
            [0.25, 0.25, 0.25, 0.25].forEach((p, i) => {
                ctx.fillStyle = colors[i];
                ctx.beginPath(); ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, start, start + (Math.PI * 2 * p));
                ctx.fill();
                start += Math.PI * 2 * p;
            });
        }
        function playRolls() {
            let bet = document.getElementById('roll-bet').value;
            const wheel = document.getElementById('rolls-canvas');
            wheel.style.transform = `rotate(${Math.floor(Math.random()*1000)+2000}deg)`;
            tg.sendData('play_rolls_' + bet);
        }
        function startRocket() {
            let m = document.getElementById('rock-mult'), b = document.getElementById('btn-rock'), v = 1.0;
            b.disabled = true;
            let t = setInterval(() => {
                v += 0.04; m.innerText = v.toFixed(2) + 'x';
                if(v > 2.5) { clearInterval(t); tg.sendData('play_rocket_'+document.getElementById('rock-bet').value); b.disabled = false; }
            }, 50);
        }
    </script>
</body>
</html>
