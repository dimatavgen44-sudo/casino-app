
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .header { display: flex; justify-content: space-between; padding: 15px; background: #1a1a1a; border-bottom: 1px solid #333; }
        .balance-card { background: #262626; padding: 5px 12px; border-radius: 12px; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .add-btn { background: #f1c40f; color: black; border: none; border-radius: 8px; width: 24px; height: 24px; font-weight: bold; cursor: pointer; }
        
        .screen { display: none; padding: 20px; height: 80vh; overflow-y: auto; }
        .active { display: block; }

        /* Меню */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-item { background: #1a1a1a; border: 1px solid #333; border-radius: 20px; padding: 30px 10px; cursor: pointer; transition: 0.2s; }
        .menu-item:active { transform: scale(0.95); background: #222; }
        .icon { font-size: 40px; margin-bottom: 10px; }

        /* Игры */
        .game-title { color: #f1c40f; font-size: 24px; margin-bottom: 20px; }
        .mult { font-size: 50px; font-weight: 800; margin: 30px 0; color: #fff; }
        .btn-main { background: #f1c40f; color: black; border: none; width: 100%; padding: 18px; border-radius: 15px; font-size: 18px; font-weight: bold; }
        .back-btn { margin-top: 30px; color: #888; background: none; border: none; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 20px; font-weight: 800;">STAR HUB</div>
        <div class="balance-card">
            <span id="user-bal">0</span> ⭐
            <button class="add-btn" onclick="sendToBot('deposit')">+</button>
        </div>
    </div>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="screen-menu" class="screen active">
        <div class="menu-grid">
            <div class="menu-item" onclick="openGame('rocket')"><div class="icon">🚀</div>РАКЕТА</div>
            <div class="menu-item" onclick="openGame('mines')"><div class="icon">💣</div>МИНЫ</div>
            <div class="menu-item" onclick="openGame('rolls')"><div class="icon">🎰</div>ROLLS</div>
            <div class="menu-item" onclick="openGame('slots')"><div class="icon">🍒</div>СЛОТЫ</div>
        </div>
    </div>

    <!-- ЭКРАН ИГРЫ (ОБЩИЙ) -->
    <div id="screen-game" class="screen">
        <h2 class="game-title" id="game-name">ИГРА</h2>
        <div id="rocket-area">
            <div class="mult" id="mult">1.00x</div>
        </div>
        <button class="btn-main" onclick="play()">СТАВКА 10 ⭐</button>
        <br>
        <button class="back-btn" onclick="showMenu()">← НАЗАД В МЕНЮ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = '#0f0f0f';

        function sendToBot(action) {
            tg.sendData(action);
        }

        function openGame(name) {
            document.getElementById('screen-menu').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            document.getElementById('game-name').innerText = name.toUpperCase();
        }

        function showMenu() {
            document.getElementById('screen-game').classList.remove('active');
            document.getElementById('screen-menu').classList.add('active');
        }

        function play() {
            // Отправляем боту название игры и ставку
            let game = document.getElementById('game-name').innerText.toLowerCase();
            tg.sendData("play_" + game + "_10");
        }
    </script>
</body>
</html>
