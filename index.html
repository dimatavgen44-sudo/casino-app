<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        :root { --gold: #ffcc33; --neon: #f1c40f; --bg: #0d0d12; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; text-align: center; overflow-x: hidden; }
        .header { display: flex; justify-content: space-between; padding: 15px; background: #16161e; border-bottom: 2px solid var(--neon); }
        .bal-box { background: #26262b; padding: 5px 12px; border-radius: 15px; border: 1px solid var(--gold); display: flex; align-items: center; gap: 8px; }
        
        .screen { display: none; padding: 20px; }
        .active { display: block; }

        /* НАСТОЯЩЕЕ КОЛЕСО */
        .wheel-wrap { position: relative; width: 260px; height: 260px; margin: 20px auto; }
        #wheel-canvas { width: 100%; height: 100%; border-radius: 50%; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); border: 5px solid #fff; box-shadow: 0 0 20px var(--neon); }
        .center-timer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; border: 2px solid var(--gold); z-index: 10; }
        .marker { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); color: #ff3b30; font-size: 30px; z-index: 20; }

        .btn-pay { background: var(--gold); color: #000; border: none; border-radius: 50%; width: 25px; height: 25px; font-weight: bold; cursor: pointer; }
        .main-btn { background: linear-gradient(135deg, var(--gold), #d4ac0d); color: black; border: none; width: 100%; padding: 20px; border-radius: 15px; font-size: 20px; font-weight: 900; margin-top: 20px; }
        input { background: #1c1c24; border: 1px solid #444; color: white; width: 100%; padding: 15px; border-radius: 12px; font-size: 18px; text-align: center; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="header">
        <div style="color:var(--gold); font-weight:900; font-size:20px;">👑 HARD GIFT</div>
        <div class="bal-box">
            <span id="bal-val">0</span> ⭐
            <button class="btn-pay" onclick="tg.sendData('deposit')">+</button>
        </div>
    </div>

    <!-- МЕНЮ -->
    <div id="scr-menu" class="screen active">
        <button class="main-btn" onclick="show('scr-rolls')">🎡 ФОРТУНА (ROLLS)</button>
        <button class="main-btn" onclick="show('scr-rocket')" style="background:#444; color:#fff;">🚀 РАКЕТА</button>
    </div>

    <!-- ФОРТУНА -->
    <div id="scr-rolls" class="screen">
        <h2 style="color:var(--gold)">Роллс</h2>
        <div class="wheel-wrap">
            <div class="marker">▼</div>
            <canvas id="wheel-canvas" width="500" height="500"></canvas>
            <div class="center-timer" id="timer">00:30</div>
        </div>
        <div style="background:#16161e; padding:15px; border-radius:15px;">
            <p style="margin:0 0 10px 0; color:#888;">Ваша ставка в банк:</p>
            <input type="number" id="bet-input" value="10">
        </div>
        <button class="main-btn" onclick="playRolls()">ПОСТАВИТЬ</button>
        <button onclick="show('scr-menu')" style="margin-top:20px; background:none; border:none; color:#888;">← Назад</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'scr-rolls') drawStaticWheel();
        }

        // Рисуем доли (пример 50/50 если двое игроков)
        function drawStaticWheel() {
            const canvas = document.getElementById('wheel-canvas');
            const ctx = canvas.getContext('2d');
            const colors = ['#4285F4', '#FBBC05', '#34A853', '#EA4335'];
            
            ctx.clearRect(0,0,500,500);
            let startAngle = 0;
            // Демо-отрисовка двух равных долей
            [0.5, 0.5].forEach((percent, i) => {
                ctx.fillStyle = colors[i];
                ctx.beginPath();
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, startAngle, startAngle + (Math.PI * 2 * percent));
                ctx.fill();
                startAngle += (Math.PI * 2 * percent);
            });
        }

        function playRolls() {
            let bet = document.getElementById('bet-input').value;
            tg.sendData("play_rolls_" + bet);
            
            // Анимация вращения при ставке
            const wheel = document.getElementById('wheel-canvas');
            let randomDeg = Math.floor(Math.random() * 360) + 1440; // Минимум 4 оборота
            wheel.style.transform = `rotate(${randomDeg}deg)`;
            
            let sec = 30;
            let t = setInterval(() => {
                sec--;
                document.getElementById('timer').innerText = "00:" + (sec < 10 ? "0" : "") + sec;
                if(sec <= 0) {
                    clearInterval(t);
                    wheel.style.transition = 'none';
                    wheel.style.transform = 'rotate(0deg)';
                    setTimeout(() => { wheel.style.transition = 'transform 4s cubic-bezier(0.15, 0, 0.15, 1)'; }, 100);
                }
            }, 1000);
        }
    </script>
</body>
</html>
