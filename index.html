<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        :root { --gold: #f1c40f; --bg: #0b0b0d; --card: #1c1c1e; --blue: #007aff; }
        body { 
            background: var(--bg); 
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px), radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px; 
            color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 30px; 
        }
        .header { display: flex; justify-content: space-between; padding: 15px 20px; background: rgba(28,28,30,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .bal-box { background: #2c2c2e; padding: 8px 15px; border-radius: 20px; font-weight: bold; display: flex; align-items: center; gap: 8px; font-size: 18px; border: 1px solid var(--gold); }
        .add-btn { background: var(--gold); color: black; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 20px; font-weight: bold; }

        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 20px; }
        .menu-btn { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #333; display: flex; align-items: center; gap: 20px; color: white; transition: 0.1s; text-align: left; }
        .menu-btn:active { transform: scale(0.96); }
        .menu-btn .icon { font-size: 45px; }
        .menu-btn .title { font-size: 22px; font-weight: bold; display: block; }
        .menu-btn .desc { color: #888; font-size: 14px; }

        .screen { display: none; padding: 20px; text-align: center; }
        .active { display: block; }
        
        .input-box { background: var(--card); padding: 20px; border-radius: 20px; margin: 20px 0; border: 1px solid #333; }
        input { background: #2c2c2e; border: 1px solid #444; color: white; width: 100%; padding: 15px; border-radius: 12px; font-size: 20px; text-align: center; box-sizing: border-box; outline: none; }
        .main-btn { background: var(--gold); color: black; border: none; width: 100%; padding: 22px; border-radius: 18px; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(241, 196, 15, 0.3); }

        /* Ракета Фикс */
        .rocket-area { height: 200px; background: rgba(0,0,0,0.5); border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 20px 0; border: 2px dashed #444; }
        #rock-mult { font-size: 70px; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px rgba(241, 196, 15, 0.5); }

        /* Слот */
        .slot-box { font-size: 70px; background: #1c1c1e; padding: 30px; border-radius: 20px; margin: 20px 0; border: 2px solid #333; }

        .back-btn { margin-top: 25px; color: #888; border: none; background: none; font-size: 16px; width: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 22px; font-weight: 900; letter-spacing: 1px;">STAR HUB</div>
        <div class="bal-box">
            <span id="bal">0</span> <span style="color:var(--gold)">⭐</span>
            <button class="add-btn" onclick="send('deposit')">+</button>
        </div>
    </div>

    <!-- МЕНЮ -->
    <div id="scr-menu" class="screen active">
        <div class="menu-grid">
            <div class="menu-btn" onclick="show('scr-rocket')">
                <span class="icon">🚀</span>
                <div class="info"><span class="title">РАКЕТА</span><span class="desc">Множитель до 100x</span></div>
            </div>
            <div class="menu-btn" onclick="show('scr-slots')">
                <span class="icon">🎰</span>
                <div class="info"><span class="title">СЛОТЫ</span><span class="desc">Классические 777</span></div>
            </div>
            <div class="menu-btn" onclick="show('scr-mines')">
                <span class="icon">💣</span>
                <div class="info"><span class="title">МИНЫ</span><span class="desc">Выбери кол-во бомб</span></div>
            </div>
            <div class="menu-btn" onclick="show('scr-rolls')">
                <span class="icon">🎡</span>
                <div class="info"><span class="title">ROLLS</span><span class="desc">Общий банк игроков</span></div>
            </div>
        </div>
    </div>

    <!-- ЭКРАН РАКЕТА -->
    <div id="scr-rocket" class="screen">
        <h2 style="color:var(--gold)">🚀 CRASH GAME</h2>
        <div class="rocket-area"><div id="rock-mult">1.00x</div></div>
        <div class="input-box">
            <input type="number" id="rock-bet" value="10">
        </div>
        <button class="main-btn" id="btn-rock" onclick="startRocket()">ВЗЛЕТЕТЬ</button>
        <button class="back-btn" onclick="show('scr-menu')">← НАЗАД</button>
    </div>

    <!-- ЭКРАН СЛОТЫ -->
    <div id="scr-slots" class="screen">
        <h2 style="color:var(--gold)">🎰 SLOTS 777</h2>
        <div class="slot-box" id="slot-reels">❓ ❓ ❓</div>
        <div class="input-box"><input type="number" id="slot-bet" value="10"></div>
        <button class="main-btn" id="btn-slot" onclick="startSlots()">КРУТИТЬ</button>
        <button class="back-btn" onclick="show('scr-menu')">← НАЗАД</button>
    </div>

    <!-- ЭКРАН ROLLS -->
    <div id="scr-rolls" class="screen">
        <h2 style="color:var(--gold)">🎡 ROLLS JACKPOT</h2>
        <p style="color:#888">Введите сумму ставки для входа в общий банк</p>
        <div class="input-box"><input type="number" id="rolls-bet" value="10"></div>
        <button class="main-btn" onclick="send('play_rolls_'+document.getElementById('rolls-bet').value)">ВНЕСТИ В БАНК</button>
        <button class="back-btn" onclick="show('scr-menu')">← НАЗАД</button>
    </div>

    <!-- ЭКРАН МИНЫ -->
    <div id="scr-mines" class="screen">
        <h2 style="color:var(--gold)">💣 MINES</h2>
        <div class="input-box">
            <p>Ставка:</p><input type="number" id="mine-bet" value="10">
            <p>Кол-во мин (1-24):</p><input type="number" id="mine-cnt" value="3">
        </div>
        <button class="main-btn" onclick="send('play_mines_'+document.getElementById('mine-bet').value+'_'+document.getElementById('mine-cnt').value)">ИГРАТЬ</button>
        <button class="back-btn" onclick="show('scr-menu')">← НАЗАД</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#1c1c1e';

        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function send(data) { tg.sendData(data); }

        function startRocket() {
            let m = document.getElementById('rock-mult');
            let b = document.getElementById('btn-rock');
            let bet = document.getElementById('rock-bet').value;
            let val = 1.00;
            b.disabled = true;
            let t = setInterval(() => {
                val += 0.03;
                m.innerText = val.toFixed(2) + 'x';
                if(val > 2.5) { 
                    clearInterval(t); 
                    send('play_rocket_' + bet);
                    setTimeout(() => { b.disabled = false; m.innerText = '1.00x'; }, 3000);
                }
            }, 50);
        }

        function startSlots() {
            let r = document.getElementById('slot-reels');
            let bet = document.getElementById('slot-bet').value;
            const i = ['7️⃣','💎','🍒','🍋','🔔'];
            let t = setInterval(() => {
                r.innerText = i[Math.floor(Math.random()*5)] + ' ' + i[Math.floor(Math.random()*5)] + ' ' + i[Math.floor(Math.random()*5)];
            }, 100);
            setTimeout(() => { clearInterval(t); send('play_slots_' + bet); }, 2000);
        }
    </script>
</body>
</html>
